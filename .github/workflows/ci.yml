name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.13.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.17.0
          cache: pnpm
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.1.0
        with:
          python-version: 3.14.6
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v6.1.0
        with:
          go-version-file: sdks/go/go.mod
          cache: false
      - name: Use stable Rust
        run: rustup toolchain install stable --profile minimal && rustup default stable
      - run: pnpm install --frozen-lockfile
      - run: pnpm format
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm test:sdks
      - run: pnpm build
      - name: Install Playwright browsers
        run: pnpm --filter @aegis/e2e exec playwright install --with-deps chromium firefox webkit
      - name: Run Docker end-to-end and security tests
        run: pnpm test:e2e
      - name: Upload end-to-end failure artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-artifacts
          path: |
            apps/e2e/playwright-report/
            apps/e2e/test-results/
          if-no-files-found: ignore
          retention-days: 14
