name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.13.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.17.0
          cache: pnpm
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v6.1.0
        with:
          python-version: 3.14.6
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.1.0
        with:
          go-version-file: sdks/go/go.mod
          cache: false
      - name: Use stable Rust
        run: rustup toolchain install stable --profile minimal && rustup default stable
      - run: pnpm install --frozen-lockfile
      - name: Verify release identity
        run: node scripts/release.mjs verify "$GITHUB_REF_NAME"
      - run: pnpm format
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm test:sdks
      - run: pnpm build
      - name: Install Playwright browsers
        run: pnpm --filter @aegis/e2e exec playwright install --with-deps chromium firefox webkit
      - name: Run Docker end-to-end and security tests
        run: pnpm test:e2e

  publish:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      attestations: write
      contents: write
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: api-meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/astoristhebrave/aegis-api
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - id: api-build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: apps/api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.api-meta.outputs.tags }}
          labels: ${{ steps.api-meta.outputs.labels }}
          build-args: |
            AEGIS_VERSION=${{ steps.version.outputs.value }}
            SOURCE_REVISION=${{ github.sha }}
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ghcr.io/astoristhebrave/aegis-api
          subject-digest: ${{ steps.api-build.outputs.digest }}
          push-to-registry: true
      - id: console-meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/astoristhebrave/aegis-console
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - id: console-build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: apps/console/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.console-meta.outputs.tags }}
          labels: ${{ steps.console-meta.outputs.labels }}
          build-args: |
            AEGIS_VERSION=${{ steps.version.outputs.value }}
            SOURCE_REVISION=${{ github.sha }}
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ghcr.io/astoristhebrave/aegis-console
          subject-digest: ${{ steps.console-build.outputs.digest }}
          push-to-registry: true
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --title "Aegis ${{ steps.version.outputs.value }}" --generate-notes --verify-tag
