version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
      time: '05:00'
      timezone: Europe/London
    open-pull-requests-limit: 10
    rebase-strategy: auto
    labels:
      - dependencies
    commit-message:
      prefix: 'chore(deps)'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '05:00'
      timezone: Europe/London
    open-pull-requests-limit: 5
    rebase-strategy: auto
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: 'chore(actions)'
