services:
  postgres:
    image: postgres:18.4@sha256:32ca0af8e77bfb8c6610c488e4691f83f972a3e9e64d3b02facf3ab111ad5500
    environment:
      POSTGRES_DB: governance
      POSTGRES_USER: governance
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set a unique database password before starting Aegis.}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U governance -d governance']
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - governance-postgres-v18:/var/lib/postgresql

  api:
    image: ghcr.io/astoristhebrave/aegis-api:${AEGIS_VERSION:?Set AEGIS_VERSION to a published Aegis release.}
    pull_policy: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MASTER_KEY: ${MASTER_KEY:?Set MASTER_KEY to a base64-encoded 32-byte key before starting Aegis.}
      PGHOST: postgres
      PGPORT: '5432'
      PGDATABASE: governance
      PGUSER: governance
      PGPASSWORD: ${POSTGRES_PASSWORD:?Set a unique database password before starting Aegis.}
      PORT: '3000'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(\"http://127.0.0.1:3000/ready\").then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    ports:
      - '${AEGIS_API_HOST:-127.0.0.1}:${AEGIS_API_PORT:-3000}:3000'

  console:
    image: ghcr.io/astoristhebrave/aegis-console:${AEGIS_VERSION:?Set AEGIS_VERSION to a published Aegis release.}
    pull_policy: always
    depends_on:
      api:
        condition: service_healthy
    environment:
      AEGIS_API_URL: http://api:3000
      PORT: '4173'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(\"http://127.0.0.1:4173/health\").then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    ports:
      - '${AEGIS_CONSOLE_HOST:-127.0.0.1}:${AEGIS_CONSOLE_PORT:-4173}:4173'

volumes:
  governance-postgres-v18:
